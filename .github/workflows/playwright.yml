name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

      # ── Java & Maven setup ────────────────────────────────────
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

      # ── Build Spring WAR ──────────────────────────────────────
    - name: Build Spring application
      run: mvn clean package -DskipTests

      # ── Tomcat setup & deploy ─────────────────────────────────
    - name: Download & configure Tomcat
      run: |
        wget -q https://archive.apache.org/dist/tomcat/tomcat-10/v10.1.20/bin/apache-tomcat-10.1.20.tar.gz
        tar -xzf apache-tomcat-10.1.20.tar.gz
        mv apache-tomcat-10.1.20 tomcat

    - name: Deploy WAR to Tomcat
      run: |
        # Adjust the WAR path/name to match your pom.xml <finalName>
        cp target/*.war tomcat/webapps/ROOT.war

    - name: Start Tomcat
      run: |
        chmod +x tomcat/bin/*.sh
        tomcat/bin/startup.sh

    - name: Wait for Tomcat to be ready
      run: |
        echo "Waiting for app to start..."
        for i in {1..30}; do
          if curl -sf http://localhost:8080 > /dev/null; then
            echo "App is up!"
            break
          fi
          echo "Attempt $i/30 - waiting..."
          sleep 3
        done  
    

    #------SETUP PLAYWRIGHT-------
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
        cache-dependency-path: tests-demo/package-lock.json
    - name: Install dependencies
      working-directory: tests-demo
      run: npm ci
    - name: Install Playwright Browsers
      working-directory: tests-demo
      run: npx playwright install --with-deps chromium
    - name: Run Playwright tests
      working-directory: tests-demo
      run: npx playwright test
      env:
        BASE_URL: http://localhost:8080/parabank/
        PARABANK_APP_LINK: http://localhost:8080/parabank/
        USER_DAN_USERNAME: ${{ secrets.USER_DAN_USERNAME }}
        USER_DAN_PASSWORD: ${{ secrets.USER_DAN_PASSWORD }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
